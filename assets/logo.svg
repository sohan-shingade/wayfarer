<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rose" x1="80" y1="28" x2="80" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="80" cy="80" r="66" stroke="url(#ring)" stroke-width="7"/>
  <!-- tick marks N E S W -->
  <g stroke="url(#ring)" stroke-width="5" stroke-linecap="round">
    <line x1="80" y1="8"   x2="80" y2="20"/>
    <line x1="80" y1="140" x2="80" y2="152"/>
    <line x1="8"   y1="80" x2="20"  y2="80"/>
    <line x1="140" y1="80" x2="152" y2="80"/>
  </g>
  <!-- compass rose: long N-S / E-W points -->
  <path d="M80 28 L92 80 L80 132 L68 80 Z" fill="url(#rose)"/>
  <path d="M28 80 L80 68 L132 80 L80 92 Z" fill="url(#rose)" fill-opacity="0.55"/>
  <!-- needle highlight: NE-pointing diagonal -->
  <path d="M80 80 L114 46 L88 72 Z" fill="#38bdf8"/>
  <circle cx="80" cy="80" r="8" fill="#6366f1"/>
  <circle cx="80" cy="80" r="3.5" fill="#e0f2fe"/>
</svg>
